version: "3.9"

services:

  postgres_db:
    image: postgres:15
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  auth_service:
    build: ./Backend_Server/Auth-service
    container_name: auth_microservice
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres_db:5432/auth_db

  # ✅ REPORT SERVICE (ديالك)
  report_service:
    build: ./Backend_Server/Report-service
    container_name: report_microservice
    restart: always
    ports:
      - "8001:8000"   # 👈 باش ما يتصادمش مع auth
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres_db:5432/report_db

  frontend:
    build: ./Frontend
    container_name: erp_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - auth_service
      - report_service

volumes:
  postgres_data:
  pgadmin_data: