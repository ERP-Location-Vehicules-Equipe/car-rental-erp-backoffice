version: "3.9"

services:

  postgres_db:
    image: postgres:15
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  auth_service:
    build: ./Auth-service
    container_name: auth_microservice
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres_db:5432/auth_db

  finance_service:
    build: ./Finance-service
    container_name: finance_microservice
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres_db:5432/finance_db
  frontend:
    build: ../Frontend/finance-frontend
    container_name: finance_frontend
    restart: always
    ports:
      - "5174:5174"
    volumes:
      - ../Frontend/finance-frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - finance_service
volumes:
  postgres_data:
  pgadmin_data: