name: Notification Service CI

on:
  push:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/notification_service/**"
      - "notification_service/**"
      - ".github/workflows/notification-ci.yml"
  pull_request:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/notification_service/**"
      - "notification_service/**"
      - ".github/workflows/notification-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notification-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Verify Notification Service
    runs-on: ubuntu-latest
    outputs:
      notification_dir: ${{ steps.resolve_path.outputs.notification_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Notification Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/notification_service" ]; then
            echo "notification_dir=code/Backend_Server/notification_service" >> "$GITHUB_OUTPUT"
          elif [ -d "notification_service" ]; then
            echo "notification_dir=notification_service" >> "$GITHUB_OUTPUT"
          else
            echo "notification_service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.notification_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.resolve_path.outputs.notification_dir }}/requirements.txt"

      - name: Verify resolved folder
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.notification_dir }}"
          ls -la "${{ steps.resolve_path.outputs.notification_dir }}"

      - name: Byte-compile Python sources
        run: python -m compileall -q "${{ steps.resolve_path.outputs.notification_dir }}"

  docker-build:
    name: Build Notification Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t notification-service:${{ github.sha }} "./${{ needs.tests.outputs.notification_dir }}"
