name: Auth Service CI

on:
  push:
    branches: [main]
    paths:
      - "code/Backend_Server/Auth-service/**"
      - "Auth-service/**"
      - ".github/workflows/auth-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/Backend_Server/Auth-service/**"
      - "Auth-service/**"
      - ".github/workflows/auth-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auth-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Auth Service tests
    runs-on: ubuntu-latest
    outputs:
      auth_dir: ${{ steps.resolve_path.outputs.auth_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Auth Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/Auth-service" ]; then
            echo "auth_dir=code/Backend_Server/Auth-service" >> "$GITHUB_OUTPUT"
          elif [ -d "Auth-service" ]; then
            echo "auth_dir=Auth-service" >> "$GITHUB_OUTPUT"
          else
            echo "Auth-service directory not found"
            echo "Repository tree (depth 3):"
            find . -maxdepth 3 -type d | sort
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.auth_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.resolve_path.outputs.auth_dir }}/requirements.txt"

      - name: Verify test folders
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.auth_dir }}"
          ls -la "${{ steps.resolve_path.outputs.auth_dir }}"
          ls -la "${{ steps.resolve_path.outputs.auth_dir }}/tests"

      - name: Run pytest
        run: pytest -q "${{ steps.resolve_path.outputs.auth_dir }}/tests"

  docker-build:
    name: Build Auth Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t auth-service:${{ github.sha }} "./${{ needs.tests.outputs.auth_dir }}"
