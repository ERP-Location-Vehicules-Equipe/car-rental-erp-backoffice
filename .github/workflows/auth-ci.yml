name: Auth Service CI

on:
  push:
    paths:
      - "Auth-service/**"
  pull_request:
    paths:
      - "Auth-service/**"

jobs:

  test-auth-service:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          cd Auth-service
          pip install -r requirements.txt


      - name: Run Lint (Code Quality)
        run: |
          pip install flake8
          flake8 Auth-service --max-line-length=120


      - name: Run Tests
        run: |
          pip install pytest
          pytest Auth-service


      - name: Build Docker Image
        run: |
          docker build -t auth-service ./Auth-service