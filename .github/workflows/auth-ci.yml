name: Auth Service CI

on:
  push:
    branches: [main]
    paths:
      - "code/Backend_Server/Auth-service/**"
      - ".github/workflows/auth-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/Backend_Server/Auth-service/**"
      - ".github/workflows/auth-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auth-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Auth Service tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: code/Backend_Server/Auth-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: code/Backend_Server/Auth-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q tests

  docker-build:
    name: Build Auth Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t auth-service:${{ github.sha }} ./code/Backend_Server/Auth-service
