name: Fleet Service CI

on:
  push:
    branches: [main]
    paths:
      - "code/Backend_Server/fleet-service/**"
      - "fleet-service/**"
      - ".github/workflows/fleet-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/Backend_Server/fleet-service/**"
      - "fleet-service/**"
      - ".github/workflows/fleet-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fleet-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Fleet Service tests
    runs-on: ubuntu-latest
    outputs:
      fleet_dir: ${{ steps.resolve_path.outputs.fleet_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Fleet Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/fleet-service" ]; then
            echo "fleet_dir=code/Backend_Server/fleet-service" >> "$GITHUB_OUTPUT"
          elif [ -d "fleet-service" ]; then
            echo "fleet_dir=fleet-service" >> "$GITHUB_OUTPUT"
          else
            echo "fleet-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Resolve tests folder
        id: resolve_tests
        shell: bash
        run: |
          SVC="${{ steps.resolve_path.outputs.fleet_dir }}"
          if [ -d "$SVC/tests" ]; then
            echo "tests_dir=$SVC/tests" >> "$GITHUB_OUTPUT"
          elif [ -d "$SVC/Test" ]; then
            echo "tests_dir=$SVC/Test" >> "$GITHUB_OUTPUT"
          else
            echo "No tests folder found in $SVC (expected tests/ or Test/)"
            ls -la "$SVC"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.fleet_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.resolve_path.outputs.fleet_dir }}/requirements.txt"

      - name: Verify resolved folders
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.fleet_dir }}"
          echo "Resolved tests dir: ${{ steps.resolve_tests.outputs.tests_dir }}"
          ls -la "${{ steps.resolve_tests.outputs.tests_dir }}"

      - name: Run pytest
        env:
          SECRET_KEY: test_fleet_ci_secret
        run: pytest -q "${{ steps.resolve_tests.outputs.tests_dir }}"

  docker-build:
    name: Build Fleet Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fleet-service:${{ github.sha }} "./${{ needs.tests.outputs.fleet_dir }}"
