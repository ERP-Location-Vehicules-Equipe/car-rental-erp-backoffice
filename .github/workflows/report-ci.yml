name: Report Service CI

on:
  push:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/Report-service/**"
      - "Report-service/**"
      - ".github/workflows/report-ci.yml"
  pull_request:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/Report-service/**"
      - "Report-service/**"
      - ".github/workflows/report-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: report-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Report Service tests
    runs-on: ubuntu-latest
    outputs:
      report_dir: ${{ steps.resolve_path.outputs.report_dir }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: report_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Report Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/Report-service" ]; then
            echo "report_dir=code/Backend_Server/Report-service" >> "$GITHUB_OUTPUT"
          elif [ -d "Report-service" ]; then
            echo "report_dir=Report-service" >> "$GITHUB_OUTPUT"
          else
            echo "Report-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Resolve tests folder
        id: resolve_tests
        shell: bash
        run: |
          SVC="${{ steps.resolve_path.outputs.report_dir }}"
          if [ -d "$SVC/tests" ]; then
            echo "tests_dir=$SVC/tests" >> "$GITHUB_OUTPUT"
          elif [ -d "$SVC/Test" ]; then
            echo "tests_dir=$SVC/Test" >> "$GITHUB_OUTPUT"
          else
            echo "No tests folder found in $SVC (expected tests/ or Test/)"
            ls -la "$SVC"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.report_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.resolve_path.outputs.report_dir }}/requirements.txt"
          pip install pytest

      - name: Verify resolved folders
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.report_dir }}"
          echo "Resolved tests dir: ${{ steps.resolve_tests.outputs.tests_dir }}"
          ls -la "${{ steps.resolve_tests.outputs.tests_dir }}"

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/report_test
        run: python -m pytest -q "${{ steps.resolve_tests.outputs.tests_dir }}"

  docker-build:
    name: Build Report Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t report-service:${{ github.sha }} "./${{ needs.tests.outputs.report_dir }}"
