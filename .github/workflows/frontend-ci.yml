name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "code/Frontend/**"
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/Frontend/**"
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Lint and build Frontend
    runs-on: ubuntu-latest
    outputs:
      frontend_dir: ${{ steps.resolve_path.outputs.frontend_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Frontend path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Frontend" ]; then
            echo "frontend_dir=code/Frontend" >> "$GITHUB_OUTPUT"
          elif [ -d "Frontend" ]; then
            echo "frontend_dir=Frontend" >> "$GITHUB_OUTPUT"
          else
            echo "Frontend directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ steps.resolve_path.outputs.frontend_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.resolve_path.outputs.frontend_dir }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ steps.resolve_path.outputs.frontend_dir }}
        run: npm run lint

      - name: Run production build
        working-directory: ${{ steps.resolve_path.outputs.frontend_dir }}
        run: npm run build

  docker-build:
    name: Build Frontend Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t erp-frontend:${{ github.sha }} "./${{ needs.tests.outputs.frontend_dir }}"
