name: Transfer Service CI

on:
  push:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/transfer-service/**"
      - "transfer-service/**"
      - ".github/workflows/transfer-ci.yml"
  pull_request:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/transfer-service/**"
      - "transfer-service/**"
      - ".github/workflows/transfer-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: transfer-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Verify Transfer Service
    runs-on: ubuntu-latest
    outputs:
      transfer_dir: ${{ steps.resolve_path.outputs.transfer_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Transfer Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/transfer-service" ]; then
            echo "transfer_dir=code/Backend_Server/transfer-service" >> "$GITHUB_OUTPUT"
          elif [ -d "transfer-service" ]; then
            echo "transfer_dir=transfer-service" >> "$GITHUB_OUTPUT"
          else
            echo "transfer-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.transfer_dir }}/app/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          SVC="${{ steps.resolve_path.outputs.transfer_dir }}"
          if [ -f "$SVC/requirements.txt" ]; then
            pip install -r "$SVC/requirements.txt"
          elif [ -f "$SVC/app/requirements.txt" ]; then
            pip install -r "$SVC/app/requirements.txt"
          else
            echo "No requirements.txt found under $SVC"
            exit 1
          fi

      - name: Verify resolved folder
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.transfer_dir }}"
          ls -la "${{ steps.resolve_path.outputs.transfer_dir }}"

      - name: Byte-compile Python sources
        run: python -m compileall -q "${{ steps.resolve_path.outputs.transfer_dir }}"

  docker-build:
    name: Build Transfer Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t transfer-service:${{ github.sha }} "./${{ needs.tests.outputs.transfer_dir }}"
