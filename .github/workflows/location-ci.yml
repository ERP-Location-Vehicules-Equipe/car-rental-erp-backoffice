name: Location Service CI

on:
  push:
    branches: [main]
    paths:
      - "code/Backend_Server/location-service/**"
      - "location-service/**"
      - ".github/workflows/location-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/Backend_Server/location-service/**"
      - "location-service/**"
      - ".github/workflows/location-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: location-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Verify Location Service
    runs-on: ubuntu-latest
    outputs:
      location_dir: ${{ steps.resolve_path.outputs.location_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Location Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/location-service" ]; then
            echo "location_dir=code/Backend_Server/location-service" >> "$GITHUB_OUTPUT"
          elif [ -d "location-service" ]; then
            echo "location_dir=location-service" >> "$GITHUB_OUTPUT"
          else
            echo "location-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.location_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.resolve_path.outputs.location_dir }}/requirements.txt"

      - name: Verify resolved folder
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.location_dir }}"
          ls -la "${{ steps.resolve_path.outputs.location_dir }}"

      - name: Byte-compile Python sources
        run: python -m compileall -q "${{ steps.resolve_path.outputs.location_dir }}"

  docker-build:
    name: Build Location Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t location-service:${{ github.sha }} "./${{ needs.tests.outputs.location_dir }}"
