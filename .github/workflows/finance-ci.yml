name: Finance Service CI

on:
  push:
    branches: [main]
    paths:
      - "code/Backend_Server/Finance-service/**"
      - "Finance-service/**"
      - ".github/workflows/finance-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/Backend_Server/Finance-service/**"
      - "Finance-service/**"
      - ".github/workflows/finance-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: finance-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Finance Service tests
    runs-on: ubuntu-latest
    outputs:
      finance_dir: ${{ steps.resolve_path.outputs.finance_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Finance Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/Finance-service" ]; then
            echo "finance_dir=code/Backend_Server/Finance-service" >> "$GITHUB_OUTPUT"
          elif [ -d "Finance-service" ]; then
            echo "finance_dir=Finance-service" >> "$GITHUB_OUTPUT"
          else
            echo "Finance-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Resolve tests folder
        id: resolve_tests
        shell: bash
        run: |
          SVC="${{ steps.resolve_path.outputs.finance_dir }}"
          if [ -d "$SVC/tests" ]; then
            echo "tests_dir=$SVC/tests" >> "$GITHUB_OUTPUT"
          elif [ -d "$SVC/Test" ]; then
            echo "tests_dir=$SVC/Test" >> "$GITHUB_OUTPUT"
          else
            echo "No tests folder found in $SVC (expected tests/ or Test/)"
            ls -la "$SVC"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ steps.resolve_path.outputs.finance_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.resolve_path.outputs.finance_dir }}/requirements.txt"

      - name: Verify resolved folders
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.finance_dir }}"
          echo "Resolved tests dir: ${{ steps.resolve_tests.outputs.tests_dir }}"
          ls -la "${{ steps.resolve_tests.outputs.tests_dir }}"

      - name: Run pytest
        env:
          SECRET_KEY: super_secret_key_123456
        run: pytest -q "${{ steps.resolve_tests.outputs.tests_dir }}"

  docker-build:
    name: Build Finance Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finance-service:${{ github.sha }} "./${{ needs.tests.outputs.finance_dir }}"
