name: Gateway Service CI

on:
  push:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/Gateway-service/**"
      - "Gateway-service/**"
      - ".github/workflows/gateway-ci.yml"
  pull_request:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/Gateway-service/**"
      - "Gateway-service/**"
      - ".github/workflows/gateway-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gateway-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Gateway Service tests
    runs-on: ubuntu-latest
    outputs:
      gateway_dir: ${{ steps.resolve_path.outputs.gateway_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Gateway Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/Gateway-service" ]; then
            echo "gateway_dir=code/Backend_Server/Gateway-service" >> "$GITHUB_OUTPUT"
          elif [ -d "Gateway-service" ]; then
            echo "gateway_dir=Gateway-service" >> "$GITHUB_OUTPUT"
          else
            echo "Gateway-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ steps.resolve_path.outputs.gateway_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.resolve_path.outputs.gateway_dir }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ steps.resolve_path.outputs.gateway_dir }}
        run: npm test

  docker-build:
    name: Build Gateway Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gateway-service:${{ github.sha }} "./${{ needs.tests.outputs.gateway_dir }}"
