name: Agence Service CI

on:
  push:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/Agence-service/**"
      - "Agence-service/**"
      - ".github/workflows/agence-ci.yml"
  pull_request:
    branches: [main, dev_merge, dev]
    paths:
      - "code/Backend_Server/Agence-service/**"
      - "Agence-service/**"
      - ".github/workflows/agence-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agence-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Agence Service tests
    runs-on: ubuntu-latest
    outputs:
      agence_dir: ${{ steps.resolve_path.outputs.agence_dir }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Agence Service path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "code/Backend_Server/Agence-service" ]; then
            echo "agence_dir=code/Backend_Server/Agence-service" >> "$GITHUB_OUTPUT"
          elif [ -d "Agence-service" ]; then
            echo "agence_dir=Agence-service" >> "$GITHUB_OUTPUT"
          else
            echo "Agence-service directory not found"
            find . -maxdepth 4 -type d | sort
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ steps.resolve_path.outputs.agence_dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix "${{ steps.resolve_path.outputs.agence_dir }}"

      - name: Verify resolved folder
        shell: bash
        run: |
          echo "Resolved service dir: ${{ steps.resolve_path.outputs.agence_dir }}"
          ls -la "${{ steps.resolve_path.outputs.agence_dir }}"

      - name: Run unit tests
        run: npm test --prefix "${{ steps.resolve_path.outputs.agence_dir }}"

      - name: Run integration tests
        env:
          INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agence_test_db
          TEST_SECRET_KEY: integration_test_secret
          SECRET_KEY: integration_test_secret
        run: npm run test:integration --prefix "${{ steps.resolve_path.outputs.agence_dir }}"

  docker-build:
    name: Build Agence Service Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agence-service:${{ github.sha }} "./${{ needs.tests.outputs.agence_dir }}"
